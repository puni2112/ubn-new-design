<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Black Thunder Active+ — UBalance Naturals</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Tiro+Devanagari+Sanskrit:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body { margin: 0; padding: 0; background: #fff; font-family: 'Geist', system-ui, sans-serif; color: #1a1a1a; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* Promo bar */
    .promo-bar {
      background: #d8e7c9;
      color: #1a1a1a;
      text-align: center;
      padding: 12px 16px;
      font-size: 16px;
      letter-spacing: 0.005em;
    }
    .promo-bar strong { font-weight: 700; }

    /* Header */
    .site-header {
      max-width: 1320px;
      margin: 0 auto;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a4d2e10;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: #1a4d2e;
      line-height: 1;
    }
    .logo-text small { display: block; font-size: 11px; letter-spacing: 0.18em; color: #1a4d2e; margin-top: 2px; }
    .nav { display: flex; gap: 36px; align-items: center; }
    .nav-link {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
    }
    .nav-link:hover { color: #1a4d2e; }
    .nav-meta { display: flex; gap: 22px; align-items: center; }
    .lang-pick {
      display: flex; align-items: center; gap: 4px;
      font-size: 16px; color: #1a1a1a; cursor: pointer;
      padding: 6px 8px; border: 1px solid transparent;
    }
    .cart {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* PDP layout */
    .pdp-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 32px 60px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
      column-gap: 56px;
      row-gap: 28px;
    }
    .gallery-col { align-self: stretch; }
    .breadcrumb {
      grid-column: 1 / -1;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0;
    }
    .breadcrumb span { color: #1a4d2e; }

    /* Below-fold cards strip */
    .ubn-strip {
      background: #faf6ee;
      padding: 60px 0;
    }
    .ubn-strip-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 32px;
    }
    .ubn-strip-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
    }
    .ubn-strip-eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a4d2e;
      margin-bottom: 6px;
    }
    .ubn-strip-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 44px;
      line-height: 1;
      color: #1a4d2e;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .ubn-strip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .ubn-strip-card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      border: none;
    }
    .ubn-strip-card img { width: 100%; height: auto; display: block; }

    /* Footer */
    .site-foot {
      background: #1a4d2e;
      color: #c8dcc4;
      padding: 200px 32px;
      text-align: center;
      font-size: 15px;
    }

    /* Right side blends as part of the page — no card chrome */
    .vA-host { background: transparent; border: 0; }
    .vA-host > div { width: 100% !important; background: transparent !important; padding: 0 !important; }
    .vA-host, .vA-host * { font-weight: 400 !important; }
    .vA-host strong, .vA-host b { font-weight: 400 !important; }

    /* ───────────────── Mobile ───────────────── */
    @media (max-width: 768px) {
      html, body { overflow-x: hidden; }

      /* Promo bar */
      .promo-bar {
        padding: 8px 12px;
        font-size: 12.5px;
        line-height: 1.35;
      }

      /* Header */
      .site-header { padding: 10px 14px; }
      .nav { display: none; }
      .lang-pick { display: none; }
      .site-header .logo img { height: 32px !important; }
      .nav-meta { gap: 0; }
      .cart svg { width: 22px; height: 22px; }

      /* PDP wrap — stack columns, leave room for sticky bar */
      .pdp-wrap {
        grid-template-columns: 1fr;
        column-gap: 0;
        row-gap: 24px;
        padding: 16px 18px 240px;
        max-width: 100%;
        min-width: 0;
      }
      .gallery-col, .vA-host { min-width: 0; max-width: 100%; }
      .vA-host > div { min-width: 0 !important; max-width: 100% !important; }
      .vA-host img { max-width: 100%; height: auto; }
      .breadcrumb { font-size: 10px; }

      /* Gallery: main image first, thumbs as horizontal scroll below */
      .pg-sticky {
        position: static !important;
        padding-left: 0 !important;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .pg-main { order: 1; }
      .pg-thumbs {
        order: 2;
        position: static !important;
        flex-direction: row !important;
        width: 100% !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        padding-right: 0 !important;
        gap: 8px !important;
        scroll-snap-type: x mandatory;
      }
      .pg-thumb {
        width: 92px !important;
        height: 92px !important;
        scroll-snap-align: start;
      }

      /* Variation A content — pad to mobile gutters */
      .vA-host > div { padding: 0 !important; }

      /* Head row stacks: title block first, concentration badge below Hindi */
      .v-head-row {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 12px !important;
      }
      .v-title {
        font-size: 42px !important;
        white-space: nowrap !important;
        line-height: 1.05 !important;
        letter-spacing: -0.02em !important;
      }
      .v-hindi {
        font-size: 22px !important;
        line-height: 1.15 !important;
      }
      .v-potency { align-self: flex-start; }

      /* Light breathing between consecutive sections of the right rail */
      .vA-host > div > * + * { margin-top: 4px; }

      /* Formulary rows: stack name above Latin so scientific names don't truncate */
      .vA-host .f-row {
        grid-template-columns: 24px minmax(0, 1fr) auto !important;
        grid-template-rows: auto auto !important;
        column-gap: 10px !important;
        row-gap: 1px !important;
      }
      .vA-host .f-row-idx {
        grid-column: 1 !important;
        grid-row: 1 / span 2 !important;
        align-self: center !important;
      }
      .vA-host .f-row-name {
        grid-column: 2 !important;
        grid-row: 1 !important;
        margin-right: 0 !important;
      }
      .vA-host .f-row-latin {
        grid-column: 2 !important;
        grid-row: 2 !important;
        white-space: normal !important;
        overflow: visible !important;
        text-overflow: clip !important;
        min-width: 0 !important;
      }
      .vA-host .f-row-qty {
        grid-column: 3 !important;
        grid-row: 1 / span 2 !important;
        align-self: center !important;
      }

      /* Sticky buy bar at bottom */
      .vA-buy-stick {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: #faf6ee;
        padding: 10px 14px 14px;
        box-shadow: 0 -2px 14px rgba(26,77,46,0.10);
        border-top: 1px solid #1a4d2e1a;
        z-index: 100;
      }

      /* Below-fold strip */
      .ubn-strip { padding: 32px 0; }
      .ubn-strip-inner { padding: 0 14px; }
      .ubn-strip-head { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 18px; }
      .ubn-strip-title { font-size: 30px; }
      .ubn-strip-grid { grid-template-columns: 1fr; gap: 12px; }

      /* Footer */
      .site-foot { padding: 60px 16px; }
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
</head>
<body>
  <div class="promo-bar">
    Enjoy <strong>Free Shipping</strong> on Online Payments. <strong>COD</strong> is now available. Get discounts starting at <strong>10%</strong> and up to <strong>30% off</strong> when you buy more than 2 bottles.
  </div>

  <header class="site-header">
    <a class="logo" href="#">
      <img src="assets/ubn-logo.svg" alt="UBalance Naturals" style="height:44px;width:auto;display:block" />
    </a>
    <nav class="nav">
      <span class="nav-link">Shop</span>
      <span class="nav-link">Articles</span>
      <span class="nav-link">Track Order</span>
      <span class="nav-link">Login</span>
    </nav>
    <div class="nav-meta">
      <div class="lang-pick">
        English
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="#1a1a1a" fill="none" stroke-width="1.4"/></svg>
      </div>
      <div class="cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M5 7h14l-1.4 11.2a2 2 0 0 1-2 1.8H8.4a2 2 0 0 1-2-1.8L5 7z" stroke="#1a4d2e" stroke-width="1.6"/>
          <path d="M9 7V5a3 3 0 0 1 6 0v2" stroke="#1a4d2e" stroke-width="1.6"/>
        </svg>
      </div>
    </div>
  </header>

  <main class="pdp-wrap">
    <section class="gallery-col" id="gallery-mount"></section>

    <aside class="vA-host" id="va-mount"></aside>
  </main>

  <footer class="site-foot">
    © UBalance Naturals · 100% Ayurvedic · Made in India
  </footer>

  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="variation-a-v2.jsx"></script>
  <script type="text/babel" src="product-gallery.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { createRoot } = ReactDOM;
    createRoot(document.getElementById('gallery-mount')).render(<ProductGallery />);
    createRoot(document.getElementById('va-mount')).render(<VariationAV2 />);
  </script>
</body>
</html>
